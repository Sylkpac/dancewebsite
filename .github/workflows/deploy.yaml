name: Deploy to S3 and Invalidate CloudFront Cache

on:
  push:
    branches:
      - main # Change this to your default branch if different

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Change this to your AWS region

      - name: Deploy to S3
        run: |
          aws s3 cp index.html s3://dances342325/
          aws s3 cp script.js s3://dances342325/
          aws s3 cp styles.css s3://dances342325/

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id E36RDVQQWU2BU9 --paths "/*"